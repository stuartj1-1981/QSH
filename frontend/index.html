<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <link rel="icon" href="./favicon.ico" sizes="48x48" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>Quantum Swarm Heating</title>
    <script>
      // Rewrite favicon hrefs to absolute paths for HA ingress compatibility.
      // Browsers resolve relative favicon hrefs inconsistently behind reverse proxies.
      (function () {
        var base = window.location.pathname.replace(/\/[^/]*$/, '') + '/';
        document.querySelectorAll('link[rel~="icon"], link[rel="apple-touch-icon"]').forEach(function (el) {
          var href = el.getAttribute('href');
          if (href && href.startsWith('./')) {
            el.setAttribute('href', base + href.slice(2));
          }
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
