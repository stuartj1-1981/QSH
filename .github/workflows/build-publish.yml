# QSH — Build and publish multi-arch Docker image to ghcr.io
#
# Triggered by version tags pushed by release-publish.sh --tag-only (Stage 7).
# The public repo already contains Dockerfile (renamed from Dockerfile.public
# by release-sync.sh), pre-compiled .so artefacts for both arches, and the
# frontend source. This workflow assembles and pushes — no compilation here.
#
# The image is published to ghcr.io/stuartj1-1981/qsh:<tag> and :latest.
# Beta testers pull via the HA add-on repository which references this image.

name: Build & Publish

on:
  push:
    tags:
      - 'v*-beta'
      - 'v[0-9]+.[0-9]+.[0-9]+'

  # Allow manual trigger for debugging
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU for arm64 cross-build (same approach as local release pipeline)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract version from config.json for image tags
      - name: Read version from config.json
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('config.json'))['version'])")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag from git tag (e.g. v0.7.42-beta)
            type=ref,event=tag
            # Also tag as latest
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            # Semantic version from config.json
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
