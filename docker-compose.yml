services:
  qsh:
    image: ghcr.io/stuartj1-1981/qsh:latest
    ports:
      - "9100:9100"
    volumes:
      - ./config:/config
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9100/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
